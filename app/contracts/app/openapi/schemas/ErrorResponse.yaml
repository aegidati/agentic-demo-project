type: object
required:
  - type
  - title
  - status
  - errorCode
properties:
  type:
    type: string
    description: Error type URI (RFC 7807 Problem Details)
    example: "about:blank"
  title:
    type: string
    description: Short human-readable summary
    example: "Bad Request"
  status:
    type: integer
    format: int32
    description: HTTP status code
    example: 400
  errorCode:
    type: string
    description: Deterministic machine-readable error identifier.
    example: membership.invalid_transition
  detail:
    type: string
    description: Detailed explanation
    default: null
  traceId:
    type: string
    description: Correlation id for diagnostics and audit tracing.
    default: null
