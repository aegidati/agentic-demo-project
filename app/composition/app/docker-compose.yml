# Enable Docker BuildKit for better caching and performance
services:
  postgres:
    image: postgres:16-alpine
    container_name: composition-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    cpus: ${POSTGRES_CPUS:-1.0}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-256}
    restart: ${POSTGRES_RESTART_POLICY:-unless-stopped}
    security_opt:
      - no-new-privileges:true
    networks:
      - composition_network

  backend:
    build:
      context: ../..
      dockerfile: composition/app/docker/backend.Dockerfile
    image: composition-backend:latest
    container_name: composition-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8080
      PORT: 3000
      HOST: 0.0.0.0
      IAM_AUDIT_RETENTION_DAYS: ${IAM_AUDIT_RETENTION_DAYS}
      IAM_AUDIT_SINK: ${IAM_AUDIT_SINK}
      IAM_AUDIT_FILE_PATH: ${IAM_AUDIT_FILE_PATH}
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - backend_audit_data:/var/lib/app
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${BACKEND_MEM_LIMIT:-512m}
    cpus: ${BACKEND_CPUS:-1.0}
    pids_limit: ${BACKEND_PIDS_LIMIT:-256}
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - composition_network
    restart: ${BACKEND_RESTART_POLICY:-unless-stopped}

  web:
    build:
      context: ../..
      dockerfile: composition/app/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:3000
    image: composition-web:latest
    container_name: composition-web
    environment:
      VITE_API_BASE_URL: http://backend:3000
    ports:
      - "${WEB_PORT}:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,nosuid,size=64m
      - /var/log/nginx:rw,nosuid,size=16m
      - /var/run:rw,nosuid,size=16m
      - /tmp:rw,noexec,nosuid,size=32m
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${WEB_MEM_LIMIT:-256m}
    cpus: ${WEB_CPUS:-0.50}
    pids_limit: ${WEB_PIDS_LIMIT:-128}
    security_opt:
      - no-new-privileges:true
    networks:
      - composition_network
    restart: ${WEB_RESTART_POLICY:-unless-stopped}

volumes:
  postgres_data:
    driver: local
  backend_audit_data:
    driver: local

networks:
  composition_network:
    driver: bridge
